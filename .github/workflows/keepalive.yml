name: Keep Render Site Warm

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        shell: bash
        run: |
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.RENDER_URL }}"
          fi
          if [ -z "$URL" ]; then
            echo "Set repository variable or secret RENDER_URL to your Render site URL."
            exit 0
          fi
          echo "Pinging $URL"
          curl -fsSL --max-time 20 "$URL" >/dev/null
